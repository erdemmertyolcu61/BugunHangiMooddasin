name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest

  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for live API keys
        run: |
          # Yalnız git'in TAKİP ETTİĞİ dosyaları tara (yerel .env göz ardı edilir).
          # Placeholder'lar (your_..._here) eşleşmez; gerçek anahtar desenleri aranır.
          if git grep -nE 'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}' -- . ; then
            echo "::error::Canlı Anthropic API anahtarı tespit edildi — commit'ten çıkar ve anahtarı döndür."
            exit 1
          fi
          echo "Sızıntı bulunamadı."
