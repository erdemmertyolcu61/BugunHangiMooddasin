<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Progressive blur filters for volumetric light layers -->
    <filter id="f1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="f2" x="-80%"  y="-80%"  width="260%" height="260%"><feGaussianBlur stdDeviation="38"/></filter>
    <filter id="f3" x="-60%"  y="-60%"  width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="f4" x="-40%"  y="-40%"  width="180%" height="180%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="f5" x="-30%"  y="-30%"  width="160%" height="160%"><feGaussianBlur stdDeviation="3.5"/></filter>

    <!-- Main ribbon gradient: dark amber → bright gold → near-white core -->
    <linearGradient id="rg" x1="0.18" y1="0.9" x2="0.82" y2="0.1">
      <stop offset="0%"   stop-color="#7A4A0E"/>
      <stop offset="20%"  stop-color="#C8821A"/>
      <stop offset="45%"  stop-color="#F0A830"/>
      <stop offset="70%"  stop-color="#FFD070"/>
      <stop offset="100%" stop-color="#FFF0D8"/>
    </linearGradient>

    <!-- Bright core gradient -->
    <linearGradient id="cg" x1="0.1" y1="0.9" x2="0.9" y2="0.1">
      <stop offset="0%"   stop-color="#D4921E"/>
      <stop offset="35%"  stop-color="#FFD090"/>
      <stop offset="100%" stop-color="#FFFAF2"/>
    </linearGradient>

    <!-- Clip to iOS-style rounded rect -->
    <clipPath id="clip"><rect width="512" height="512" rx="108"/></clipPath>
  </defs>

  <!-- Background: deep warm dark brown -->
  <rect width="512" height="512" rx="108" fill="#120A05"/>

  <g clip-path="url(#clip)">
    <!-- ── S-CURVE PATH (sine-wave ribbon) ── -->
    <!-- Single smooth cubic bezier: bottom-left → top-right, wide sweeping arcs -->

    <!-- Layer 1: Massive ambient warmth (fills lower-left and upper-right quadrants) -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="#5C3408" stroke-width="220" fill="none" stroke-linecap="round"
          filter="url(#f1)" opacity="0.38"/>

    <!-- Layer 2: Wide warm glow -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="#945E18" stroke-width="165" fill="none" stroke-linecap="round"
          filter="url(#f2)" opacity="0.42"/>

    <!-- Layer 3: Golden mid glow -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="#C88420" stroke-width="120" fill="none" stroke-linecap="round"
          filter="url(#f3)" opacity="0.55"/>

    <!-- Layer 4: Ribbon body glow -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="#D4921E" stroke-width="88" fill="none" stroke-linecap="round"
          filter="url(#f4)" opacity="0.72"/>

    <!-- Layer 5: Main visible ribbon with gradient -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="url(#rg)" stroke-width="68" fill="none" stroke-linecap="round"
          filter="url(#f5)" opacity="0.95"/>

    <!-- Layer 6: Bright core highlight -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="url(#cg)" stroke-width="30" fill="none" stroke-linecap="round"
          filter="url(#f5)" opacity="0.88"/>

    <!-- Layer 7: Hot white center line -->
    <path d="M 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
          stroke="#FFF8F0" stroke-width="10" fill="none" stroke-linecap="round"
          opacity="0.60"/>

    <!-- Layer 8: Peak brightness at inner curves (concave sides get brightest) -->
    <!-- Inner edge — lower arc concave side (upper-right of lower curve) -->
    <path d="M 230 390 C 200 320, 215 270, 268 248"
          stroke="#FFFAF5" stroke-width="6" fill="none" stroke-linecap="round"
          filter="url(#f5)" opacity="0.35"/>
    <!-- Inner edge — upper arc concave side (lower-left of upper curve) -->
    <path d="M 268 248 C 310 230, 360 230, 390 200"
          stroke="#FFFAF5" stroke-width="6" fill="none" stroke-linecap="round"
          filter="url(#f5)" opacity="0.30"/>
  </g>
</svg>
