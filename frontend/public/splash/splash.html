<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0606"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Sinemood</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;
    background:#0a0606;
    color:#f3e9d2;
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }
  body{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    padding:env(safe-area-inset-top,20px) env(safe-area-inset-right,20px) env(safe-area-inset-bottom,20px) env(safe-area-inset-left,20px);
  }

  .halo{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(60% 45% at 50% 42%,rgba(255,178,80,0.18) 0%,rgba(255,178,80,0.06) 35%,transparent 70%);
  }

  .splash{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,4vmin,32px);width:100%}

  .mark{
    width:min(58vmin,320px);
    aspect-ratio:1/1;
    object-fit:contain;
    filter:drop-shadow(0 18px 50px rgba(255,178,80,0.18)) drop-shadow(0 0 60px rgba(255,178,80,0.10));
    animation:markIn 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }
  @media(min-width:900px){
    .mark{width:min(32vmin,360px)}
  }

  .wordmark{text-align:center}
  .wordmark .name{
    font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(28px,5.5vmin,52px);
    color:#f3e9d2;letter-spacing:-0.012em;line-height:1;
    text-shadow:0 0 30px rgba(255,178,80,0.18);
    animation:fadeIn 0.9s ease-out 0.3s both;
  }
  .wordmark .tagline{
    margin-top:clamp(6px,1.5vmin,14px);
    font-family:Inter,sans-serif;font-weight:500;font-size:clamp(9px,2vmin,13px);
    letter-spacing:0.4em;text-transform:uppercase;
    color:rgba(255,178,80,0.55);
    animation:fadeIn 0.9s ease-out 0.5s both;
  }

  .dots{
    position:fixed;bottom:max(38px,calc(env(safe-area-inset-bottom,0px)+24px));
    left:50%;transform:translateX(-50%);
    display:flex;gap:6px;z-index:2;
  }
  .dots span{
    width:5px;height:5px;border-radius:50%;
    background:rgba(255,178,80,0.35);
    animation:dotPulse 1.6s ease-in-out infinite;
  }
  .dots span:first-child{background:rgba(255,200,120,0.9);animation-delay:0s}
  .dots span:nth-child(2){animation-delay:0.3s}
  .dots span:nth-child(3){animation-delay:0.6s}

  @keyframes markIn{
    0%{opacity:0;transform:scale(0.85);filter:blur(12px) drop-shadow(0 0 0 transparent)}
    100%{opacity:1;transform:scale(1);filter:blur(0) drop-shadow(0 18px 50px rgba(255,178,80,0.18)) drop-shadow(0 0 60px rgba(255,178,80,0.10))}
  }
  @keyframes fadeIn{
    0%{opacity:0;transform:translateY(8px)}
    100%{opacity:1;transform:translateY(0)}
  }
  @keyframes dotPulse{
    0%,100%{opacity:0.35;transform:scale(1)}
    50%{opacity:1;transform:scale(1.4)}
  }

  @media(prefers-reduced-motion:reduce){
    .mark{animation:none;opacity:1;transform:none;filter:drop-shadow(0 18px 50px rgba(255,178,80,0.18))}
    .wordmark .name,.wordmark .tagline{animation:none;opacity:1;transform:none}
    .dots span{animation:none}
  }
</style>
</head>
<body>
  <div class="halo" aria-hidden="true"></div>
  <div class="splash" role="status" aria-label="Sinemood yükleniyor">
    <img class="mark" src="/sinemod-mark.svg" alt="Sinemood"/>
    <div class="wordmark">
      <div class="name" aria-hidden="true">Sinemood</div>
      <div class="tagline" aria-hidden="true">Bugün hangi mooddasın?</div>
    </div>
  </div>
  <div class="dots" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
</body>
</html>
