    <!-- ═══════════════════════════════════════════════════════════
         SINEMOOD PREMIUM CINEMATIC SPLASH
         4-Phase ritual: Ignition → Trace → Bloom → Reveal
         Pure black #000 + EAB308 gold. Urbanist geometric typography.
         Smooth breathing pulse — theater dimming, not computing.
         Pure CSS, zero JS, GPU-composited, first-frame paint.
         Removed by SplashScreen.jsx handshake controller.
         ═══════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style id="sinemood-splash-styles">

      /* ╔═══════════════════════════════════════════════════════╗
         ║  FOUNDATION — Fixed overlay, pure black backdrop      ║
         ╚═══════════════════════════════════════════════════════╝ */
      #sinemood-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #000000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        overflow: hidden;
        opacity: 1;
        will-change: opacity, transform;
      }
      /* Phase 4 exit: elegant fade + slight scale → reveal content */
      #sinemood-splash.splash-exit {
        opacity: 0;
        transform: scale(1.03);
        transition: opacity 0.55s cubic-bezier(0.25, 1, 0.5, 1),
                    transform 0.55s cubic-bezier(0.25, 1, 0.5, 1);
        pointer-events: none;
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  PHASE 1 — IGNITION: Sparks at S-curve endpoints     ║
         ╚═══════════════════════════════════════════════════════╝ */

      .sp-spark-bottom {
        position: absolute;
        left: 4%; bottom: 6%;
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #fffcf0;
        box-shadow:
          0 0 6px 3px rgba(234,179,8,0.90),
          0 0 18px 8px rgba(234,179,8,0.50),
          0 0 42px 16px rgba(234,179,8,0.25),
          0 0 80px 35px rgba(234,179,8,0.08);
        opacity: 0;
        animation: spSparkIgnite 0.45s cubic-bezier(0.25,1,0.5,1) 0.1s forwards,
                   spSparkFade 0.7s ease-out 0.7s forwards;
        will-change: opacity, transform;
        z-index: 10;
      }

      .sp-spark-top {
        position: absolute;
        right: 4%; top: 6%;
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #fffcf0;
        box-shadow:
          0 0 5px 2px rgba(234,179,8,0.85),
          0 0 14px 6px rgba(234,179,8,0.45),
          0 0 32px 12px rgba(234,179,8,0.20),
          0 0 65px 28px rgba(234,179,8,0.06);
        opacity: 0;
        animation: spSparkIgnite 0.4s cubic-bezier(0.25,1,0.5,1) 0.2s forwards,
                   spSparkFade 0.6s ease-out 0.8s forwards;
        will-change: opacity, transform;
        z-index: 10;
      }

      @keyframes spSparkIgnite {
        0%   { opacity: 0; transform: translate3d(0,0,0) scale(0.2); }
        60%  { opacity: 1; transform: translate3d(0,0,0) scale(1.6); }
        100% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
      }
      @keyframes spSparkFade {
        0%   { opacity: 1; }
        100% { opacity: 0; }
      }

      /* ── Lens flare ── */
      .sp-flare {
        position: absolute;
        left: -2%; bottom: 8%;
        width: 85px; height: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(234,179,8,0.0) 15%,
          rgba(234,179,8,0.55) 45%,
          rgba(255,248,220,0.80) 50%,
          rgba(234,179,8,0.55) 55%,
          rgba(234,179,8,0.0) 85%,
          transparent 100%);
        border-radius: 2px;
        opacity: 0;
        animation: spFlareIn 0.5s ease-out 0.15s forwards,
                   spFlareOut 0.5s ease-in 0.9s forwards;
        will-change: opacity, transform;
        z-index: 10;
        filter: blur(0.8px);
      }
      @keyframes spFlareIn {
        0%   { opacity: 0; transform: translate3d(0,0,0) scaleX(0.3); }
        100% { opacity: 0.85; transform: translate3d(0,0,0) scaleX(1); }
      }
      @keyframes spFlareOut {
        0%   { opacity: 0.85; }
        100% { opacity: 0; }
      }

      /* ── Particle sprites ── */
      .sp-particles {
        position: absolute;
        left: 5%; bottom: 7%;
        width: 0; height: 0;
        z-index: 9;
      }
      .sp-particle {
        position: absolute;
        width: 2.5px; height: 2.5px;
        border-radius: 50%;
        background: rgba(234,179,8,0.85);
        opacity: 0;
        will-change: transform, opacity;
      }
      .sp-particle:nth-child(1) { animation: spPart1 0.7s ease-out 0.15s forwards; }
      .sp-particle:nth-child(2) { animation: spPart2 0.8s ease-out 0.2s forwards; }
      .sp-particle:nth-child(3) { animation: spPart3 0.65s ease-out 0.18s forwards; }
      .sp-particle:nth-child(4) { animation: spPart4 0.75s ease-out 0.22s forwards; }
      .sp-particle:nth-child(5) { animation: spPart5 0.6s ease-out 0.25s forwards; }
      .sp-particle:nth-child(6) { animation: spPart6 0.7s ease-out 0.12s forwards; }

      @keyframes spPart1 {
        0%   { opacity: 1; transform: translate3d(0,0,0) scale(1); }
        100% { opacity: 0; transform: translate3d(-25px,-18px,0) scale(0.3); }
      }
      @keyframes spPart2 {
        0%   { opacity: 1; transform: translate3d(0,0,0) scale(1); }
        100% { opacity: 0; transform: translate3d(-30px,10px,0) scale(0.2); }
      }
      @keyframes spPart3 {
        0%   { opacity: 0.9; transform: translate3d(0,0,0) scale(0.8); }
        100% { opacity: 0; transform: translate3d(-12px,-28px,0) scale(0.2); }
      }
      @keyframes spPart4 {
        0%   { opacity: 1; transform: translate3d(0,0,0) scale(1.2); }
        100% { opacity: 0; transform: translate3d(15px,-20px,0) scale(0.1); }
      }
      @keyframes spPart5 {
        0%   { opacity: 0.8; transform: translate3d(0,0,0) scale(0.6); }
        100% { opacity: 0; transform: translate3d(-18px,22px,0) scale(0.15); }
      }
      @keyframes spPart6 {
        0%   { opacity: 0.9; transform: translate3d(0,0,0) scale(0.9); }
        100% { opacity: 0; transform: translate3d(8px,15px,0) scale(0.2); }
      }

      /* Top-right particles */
      .sp-particles-top {
        position: absolute;
        right: 5%; top: 7%;
        width: 0; height: 0;
        z-index: 9;
      }
      .sp-particles-top .sp-particle { width: 2px; height: 2px; }
      .sp-particles-top .sp-particle:nth-child(1) { animation: spPartT1 0.6s ease-out 0.25s forwards; }
      .sp-particles-top .sp-particle:nth-child(2) { animation: spPartT2 0.7s ease-out 0.3s forwards; }
      .sp-particles-top .sp-particle:nth-child(3) { animation: spPartT3 0.55s ease-out 0.28s forwards; }
      .sp-particles-top .sp-particle:nth-child(4) { animation: spPartT4 0.65s ease-out 0.32s forwards; }

      @keyframes spPartT1 {
        0%   { opacity: 1; transform: translate3d(0,0,0); }
        100% { opacity: 0; transform: translate3d(22px,-14px,0); }
      }
      @keyframes spPartT2 {
        0%   { opacity: 0.9; transform: translate3d(0,0,0); }
        100% { opacity: 0; transform: translate3d(18px,12px,0); }
      }
      @keyframes spPartT3 {
        0%   { opacity: 0.8; transform: translate3d(0,0,0); }
        100% { opacity: 0; transform: translate3d(25px,5px,0); }
      }
      @keyframes spPartT4 {
        0%   { opacity: 1; transform: translate3d(0,0,0); }
        100% { opacity: 0; transform: translate3d(10px,-20px,0); }
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  AMBIENT HALO — EAB308 gold atmosphere from center    ║
         ╚═══════════════════════════════════════════════════════╝ */
      .sp-halo {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(55% 40% at 50% 42%,
          rgba(234,179,8,0.0) 0%, transparent 70%);
        animation: spHaloIn 1.8s cubic-bezier(0.25,1,0.5,1) 0.3s forwards;
        will-change: opacity;
      }
      @keyframes spHaloIn {
        0%   { opacity: 0; }
        100% { opacity: 1; background: radial-gradient(55% 40% at 50% 42%,
               rgba(234,179,8,0.18) 0%, rgba(234,179,8,0.04) 50%, transparent 70%); }
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  LOGO CONTAINER — smooth deceleration entrance        ║
         ║  scale(0.9) → scale(1) with cubic-bezier(0.25,1,0.5,1)
         ╚═══════════════════════════════════════════════════════╝ */
      .sp-logo-wrap {
        position: relative;
        width: min(58vmin, 300px); aspect-ratio: 1/1;
        animation: spLogoIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        will-change: transform, opacity, filter;
      }
      @keyframes spLogoIn {
        0%   { opacity: 0; transform: translate3d(0,0,0) scale(0.9); filter: blur(12px); }
        100% { opacity: 1; transform: translate3d(0,0,0) scale(1);   filter: blur(0); }
      }

      /* ── Breathing golden aura behind logo ── */
      .sp-glow {
        position: absolute; inset: -22%; border-radius: 50%;
        background: radial-gradient(circle,
          rgba(234,179,8,0.25) 0%,
          rgba(234,179,8,0.08) 45%,
          transparent 70%);
        filter: blur(35px);
        opacity: 0;
        animation: spGlowIn 1.2s ease-out 0.4s forwards,
                   spGlowBreathe 2.5s ease-in-out 1.6s infinite;
        will-change: opacity, transform;
      }
      @keyframes spGlowIn {
        0%   { opacity: 0; }
        100% { opacity: 0.5; }
      }
      @keyframes spGlowBreathe {
        0%, 100% { transform: scale(1);    opacity: 0.4; }
        50%      { transform: scale(1.06); opacity: 0.6; }
      }

      /* ── PNG logo ── */
      .sp-logo-img {
        position: relative; width: 100%; height: 100%; display: block;
        border-radius: 21.5%;
        filter: drop-shadow(0 12px 40px rgba(234,179,8,0.25))
                drop-shadow(0 0 55px rgba(234,179,8,0.08));
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  PHASE 2 — TRACE: Light flows along S-curve           ║
         ╚═══════════════════════════════════════════════════════╝ */
      .sp-trace-svg {
        position: absolute; inset: 0; width: 100%; height: 100%;
        border-radius: 21.5%; overflow: hidden; pointer-events: none;
      }

      .sp-trace-a {
        stroke-dasharray: 410 410;
        stroke-dashoffset: 820;
        animation: spTraceA 2.0s cubic-bezier(0.35,0,0.1,1) 0.4s forwards;
        will-change: stroke-dashoffset;
      }
      @keyframes spTraceA {
        0%   { stroke-dashoffset: 820; }
        100% { stroke-dashoffset: 410; }
      }

      .sp-trace-a-glow {
        stroke-dasharray: 410 410;
        stroke-dashoffset: 820;
        animation: spTraceA 2.0s cubic-bezier(0.35,0,0.1,1) 0.45s forwards;
        will-change: stroke-dashoffset;
      }

      .sp-trace-b {
        stroke-dasharray: 410 410;
        stroke-dashoffset: 820;
        animation: spTraceB 2.0s cubic-bezier(0.35,0,0.1,1) 0.45s forwards;
        will-change: stroke-dashoffset;
      }
      @keyframes spTraceB {
        0%   { stroke-dashoffset: 820; }
        100% { stroke-dashoffset: 410; }
      }

      .sp-trace-b-glow {
        stroke-dasharray: 410 410;
        stroke-dashoffset: 820;
        animation: spTraceB 2.0s cubic-bezier(0.35,0,0.1,1) 0.5s forwards;
        will-change: stroke-dashoffset;
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  PHASE 3 — BLOOM: Shimmer pulse when paths meet       ║
         ╚═══════════════════════════════════════════════════════╝ */
      .sp-bloom {
        position: absolute;
        inset: -10%;
        border-radius: 50%;
        background: radial-gradient(circle,
          rgba(234,179,8,0.30) 0%,
          rgba(234,179,8,0.12) 30%,
          rgba(234,179,8,0.04) 55%,
          transparent 70%);
        opacity: 0;
        transform: translate3d(0,0,0) scale(0.7);
        animation: spBloom 0.9s cubic-bezier(0.25,1,0.5,1) 2.3s forwards;
        will-change: opacity, transform;
        pointer-events: none;
        filter: blur(8px);
      }
      @keyframes spBloom {
        0%   { opacity: 0; transform: translate3d(0,0,0) scale(0.7); }
        40%  { opacity: 1; transform: translate3d(0,0,0) scale(1.08); }
        100% { opacity: 0; transform: translate3d(0,0,0) scale(1.2); }
      }

      /* Logo shimmer on bloom */
      .sp-logo-img {
        animation: spLogoShimmer 0.7s ease-out 2.35s both;
      }
      @keyframes spLogoShimmer {
        0%   { filter: drop-shadow(0 12px 40px rgba(234,179,8,0.25))
                       drop-shadow(0 0 55px rgba(234,179,8,0.08))
                       brightness(1); }
        40%  { filter: drop-shadow(0 12px 50px rgba(234,179,8,0.40))
                       drop-shadow(0 0 75px rgba(234,179,8,0.20))
                       brightness(1.12); }
        100% { filter: drop-shadow(0 12px 40px rgba(234,179,8,0.25))
                       drop-shadow(0 0 55px rgba(234,179,8,0.08))
                       brightness(1); }
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  WORDMARK — Urbanist geometric sans-serif             ║
         ╚═══════════════════════════════════════════════════════╝ */
      .sp-wordmark {
        margin-top: clamp(22px, 4.5vmin, 42px);
        text-align: center;
        animation: spTextIn 1.0s cubic-bezier(0.25,1,0.5,1) 0.6s both;
        will-change: transform, opacity;
      }
      @keyframes spTextIn {
        0%   { opacity: 0; transform: translate3d(0,12px,0); }
        100% { opacity: 1; transform: translate3d(0,0,0); }
      }
      .sp-title {
        font-family: 'Urbanist', sans-serif;
        font-weight: 600;
        font-size: clamp(22px, 4.5vmin, 40px);
        color: #f5f0e8;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        line-height: 1;
        text-shadow: 0 0 30px rgba(234,179,8,0.12);
      }
      .sp-tagline {
        margin-top: clamp(8px, 2vmin, 16px);
        font-family: 'Urbanist', sans-serif;
        font-weight: 400;
        font-size: clamp(8px, 1.6vmin, 11px);
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(234,179,8,0.38);
        animation: spTextIn 0.9s cubic-bezier(0.25,1,0.5,1) 0.85s both;
      }

      /* ╔═══════════════════════════════════════════════════════╗
         ║  REDUCED MOTION — accessibility compliance            ║
         ╚═══════════════════════════════════════════════════════╝ */
      @media (prefers-reduced-motion: reduce) {
        .sp-logo-wrap, .sp-halo, .sp-glow, .sp-wordmark, .sp-tagline,
        .sp-bloom, .sp-logo-img,
        .sp-spark-bottom, .sp-spark-top, .sp-flare,
        .sp-particle {
          animation: none !important;
          opacity: 1 !important;
          filter: none !important;
          transform: none !important;
        }
        .sp-progress-fill {
          transform: scaleX(1) !important;
        }
        .sp-trace-a, .sp-trace-a-glow,
        .sp-trace-b, .sp-trace-b-glow {
          stroke-dashoffset: 0 !important;
          animation: none !important;
        }
      }
    </style>
  </head>

  <body>
    <!-- ═══ Enhanced Cinematic Golden Flow — renders before ANY JS ═══ -->
    <div id="sinemood-splash" aria-label="Sinemood yükleniyor" role="status">
      <div class="sp-halo"></div>

      <div class="sp-logo-wrap">
        <div class="sp-glow"></div>

        <!-- Phase 1: Ignition sparks at S-curve endpoints -->
        <div class="sp-spark-bottom"></div>
        <div class="sp-spark-top"></div>
        <div class="sp-flare"></div>

        <!-- Bottom-left particle burst -->
        <div class="sp-particles">
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
        </div>

        <!-- Top-right particle burst -->
        <div class="sp-particles-top">
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
        </div>

        <!-- Phase 3: Bloom flash when trace streams meet -->
        <div class="sp-bloom"></div>

        <img src="/sinemod-mark.png" alt="" class="sp-logo-img" draggable="false" />

        <!-- Phase 2: SVG light-trace — two streams emerge from S endpoints -->
        <svg class="sp-trace-svg" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="spBlur" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="4"/>
            </filter>
            <filter id="spBlurWide" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="8"/>
            </filter>
            <clipPath id="spClip"><rect width="512" height="512" rx="108"/></clipPath>

            <!-- Gradient for Stream A: tail→head (fading gold → bright white-gold) -->
            <linearGradient id="spGradA" x1="0" y1="1" x2="0.5" y2="0.5">
              <stop offset="0%" stop-color="#EAB308" stop-opacity="0"/>
              <stop offset="50%" stop-color="#EAB308" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#FFF8DC" stop-opacity="1"/>
            </linearGradient>

            <!-- Gradient for Stream B: tail→head -->
            <linearGradient id="spGradB" x1="0.8" y1="0" x2="0.3" y2="0.6">
              <stop offset="0%" stop-color="#EAB308" stop-opacity="0"/>
              <stop offset="50%" stop-color="#EAB308" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#FFF8DC" stop-opacity="1"/>
            </linearGradient>
          </defs>

          <g clip-path="url(#spClip)">
            <!--
              Stream A: bottom-left corner (30, 480) → S bottom tip (168, 454)
                        → S center (230, 244)
              The curve starts at the rounded corner of the logo, sweeps
              diagonally inward to the S bottom-left tip, then follows the
              S-curve up to the center meeting point.
