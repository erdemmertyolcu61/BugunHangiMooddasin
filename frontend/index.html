<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/sinemod-mark.png" />
    <link rel="apple-touch-icon" href="/sinemod-mark.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="description" content="Yapay zeka destekli film keşif platformu. Ruh haline göre film önerileri, Üstad'ın notları ve sinematik keşif." />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sinemood" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <title>Sinemood — Bugün Hangi Mooddasın?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:wght@500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:wght@500;600&display=swap" media="print" onload="this.media='all'" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:wght@500;600&display=swap" /></noscript>

    <!-- Minimal first-paint placeholder — replaced instantly by React splash -->
    <style id="sinemood-splash-styles">
      #sinemood-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #000000;
        display: flex; align-items: center; justify-content: center;
        opacity: 1;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }
      #sinemood-splash.splash-exit { opacity: 0; }
      #sinemood-splash .sp-minimal-logo {
        font-family: 'Urbanist', sans-serif;
        font-weight: 600;
        font-size: clamp(22px, 4.5vmin, 40px);
        color: #f5f0e8;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }
      #sinemood-splash .sp-minimal-logo span { color: #d4af37; }
    </style>
  </head>

  <body>
    <!-- Minimal first-paint splash — replaced by React on hydrate -->
    <div id="sinemood-splash" aria-label="Sinemood yükleniyor" role="status">
      <div class="sp-minimal-logo">SINE<span>MOOD</span></div>
    </div>

        <!-- Top-right particle burst -->
        <div class="sp-particles-top">
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
          <span class="sp-particle"></span>
        </div>

        <!-- Phase 3: Bloom flash when trace streams meet -->
        <div class="sp-bloom"></div>

        <img src="/sinemod-mark.png" alt="" class="sp-logo-img" draggable="false" />

        <!-- Phase 2: SVG light-trace — two streams emerge from S endpoints -->
        <svg class="sp-trace-svg" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="spBlur" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="4"/>
            </filter>
            <filter id="spBlurWide" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="8"/>
            </filter>
            <clipPath id="spClip"><rect width="512" height="512" rx="108"/></clipPath>

            <!-- Gradient for Stream A: tail→head (fading gold → bright white-gold) -->
            <linearGradient id="spGradA" x1="0" y1="1" x2="0.5" y2="0.5">
              <stop offset="0%" stop-color="#EAB308" stop-opacity="0"/>
              <stop offset="50%" stop-color="#EAB308" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#FFF8DC" stop-opacity="1"/>
            </linearGradient>

            <!-- Gradient for Stream B: tail→head -->
            <linearGradient id="spGradB" x1="0.8" y1="0" x2="0.3" y2="0.6">
              <stop offset="0%" stop-color="#EAB308" stop-opacity="0"/>
              <stop offset="50%" stop-color="#EAB308" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#FFF8DC" stop-opacity="1"/>
            </linearGradient>
          </defs>

          <g clip-path="url(#spClip)">
            <!--
              Stream A: bottom-left corner (30, 480) → S bottom tip (168, 454)
                        → S center (230, 244)
              The curve starts at the rounded corner of the logo, sweeps
              diagonally inward to the S bottom-left tip, then follows the
              S-curve up to the center meeting point.

              Stream B: top-right corner (480, 30) → S top tip (366, 56)
                        → S center (230, 244)
              Same idea, mirrored from the top-right corner.
            -->

            <!-- Stream A: bottom-left corner → S bottom → center -->
            <!-- Glow layer (wider, softer) -->
            <path class="sp-trace-a-glow"
                  d="M 30 480 C 60 470, 120 465, 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
                  stroke="url(#spGradA)" stroke-width="28" fill="none" stroke-linecap="round"
                  opacity="0.3" filter="url(#spBlurWide)"/>
            <!-- Core layer (bright, thin) -->
            <path class="sp-trace-a"
                  d="M 30 480 C 60 470, 120 465, 168 454 C 40 392, 40 270, 230 244 C 420 218, 478 118, 366 56"
                  stroke="url(#spGradA)" stroke-width="12" fill="none" stroke-linecap="round"
                  opacity="0.85" filter="url(#spBlur)"/>

            <!-- Stream B: top-right corner → S top → center -->
            <!-- Glow layer -->
            <path class="sp-trace-b-glow"
                  d="M 480 30 C 450 40, 400 48, 366 56 C 478 118, 420 218, 230 244 C 40 270, 40 392, 168 454"
                  stroke="url(#spGradB)" stroke-width="28" fill="none" stroke-linecap="round"
                  opacity="0.3" filter="url(#spBlurWide)"/>
            <!-- Core layer -->
            <path class="sp-trace-b"
                  d="M 480 30 C 450 40, 400 48, 366 56 C 478 118, 420 218, 230 244 C 40 270, 40 392, 168 454"
                  stroke="url(#spGradB)" stroke-width="12" fill="none" stroke-linecap="round"
                  opacity="0.85" filter="url(#spBlur)"/>
          </g>
        </svg>
      </div>

      <div class="sp-wordmark">
        <div class="sp-title">Sinemood</div>
        <div class="sp-tagline">Bugün hangi mooddasın?</div>
      </div>

    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
